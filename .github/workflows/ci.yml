name: CI

on:
  push:
    branches:
      - main
      - beta
      - alpha
  pull_request:
    branches:
      - main
      - beta
      - alpha

jobs:
  ci:
    name: Lint, Typecheck, Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      # turbo.json: test -> dependsOn [^build]
      #             build -> dependsOn [^lint, ^typecheck, ^build]
      # turbo resolves the full chain: lint + typecheck -> build -> test
      - name: CI
        run: pnpm turbo test

  preview:
    name: Publish Preview Packages
    needs: ci
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      # turbo.json: build -> dependsOn [^lint, ^typecheck, ^build]
      # turbo resolves the full chain: lint + typecheck -> build
      - name: Build Packages
        run: pnpm turbo build

      - name: Publish Preview to pkg-pr-new
        run: pnpm dlx pkg-pr-new publish './packages/*'
